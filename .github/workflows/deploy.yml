name: Deploy HR Frontend

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 2222
          script: |
            cd ~/hr-front
            git pull origin main
            echo VITE_API_BASE_URL=https://api.eventra.site > .env
            echo VITE_REALTIME_URL=https://api.eventra.site/realtime >> .env
            docker compose down
            docker compose up -d --build
