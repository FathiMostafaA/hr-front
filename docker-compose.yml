version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: DockerFile
      args:
        - VITE_API_BASE_URL=https://api.eventra.site
        - VITE_REALTIME_URL=https://api.eventra.site/realtime
    container_name: hr_frontend
    ports:
      - "8081:80"
    networks:
      - hr_network

networks:
  hr_network:
    external: true
    name: hr_network
